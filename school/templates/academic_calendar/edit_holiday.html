{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
<div class="content container-fluid">

<div class="page-header">
<h3 class="page-title">Edit Holiday</h3>
</div>

<div class="card">
<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ holiday.name }}">
</div>

<div class="form-group">
<label>Start Date</label>
<input type="date" name="start_date" class="form-control" value="{{ holiday.start_date|date:'Y-m-d' }}">
</div>

<div class="form-group">
<label>End Date</label>
<input type="date" name="end_date" class="form-control" value="{{ holiday.end_date|date:'Y-m-d' }}">
</div>

<div class="form-group">
<label>Description</label>
<textarea name="description" class="form-control">{{ holiday.description }}</textarea>
</div>

<div class="form-group">
<label>
<input type="checkbox" name="is_school_closed" {% if holiday.is_school_closed %}checked{% endif %}>
 School Closed
</label>
</div>

<button type="submit" class="btn btn-success">Update</button>
<a href="{% url 'holiday_list' %}" class="btn btn-secondary">Cancel</a>

</form>

</div>
</div>

</div>
</div>
    <script src="{%static 'assets/js/jquery-3.6.0.min.js' %}"></script>
    <script src="{%static 'assets/js/popper.min.js' %}"></script>
    <script src="{%static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
    <script src="{%static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
    <script src="{%static 'assets/plugins/datatables/datatables.min.js' %}"></script>
    <script src="{%static 'assets/js/script.js' %}"></script>

{% endblock %}
